name: YouTube Cache Yenile

on:
  schedule:
    - cron: '0,45 * * * *'   # Her 45 dakikada bir
  workflow_dispatch:

jobs:
  cache:
    runs-on: ubuntu-latest
    # --- BU BÖLÜMÜ EKLEDİK ---
    permissions:
      contents: write
    # -------------------------
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Cache yenile
        run: python youtube_cache.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_cache.json
          # Değişiklik yoksa hata vermemesi için kontrol ekliyoruz
          git diff --staged --quiet || (git commit -m "youtube cache güncellendi" && git push)
